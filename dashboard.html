<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>God Claude — Dashboard</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --blue: #58a6ff;
    --purple: #bc8cff;
    --accent: #58a6ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 14px;
    line-height: 1.5;
    padding: 24px;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .header h1 {
    font-size: 24px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .header h1 span { color: var(--purple); }
  .header-meta { text-align: right; }
  .header-meta .timestamp { color: var(--text-dim); font-size: 12px; }

  /* Health Badge */
  .badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge-healthy { background: rgba(63, 185, 80, 0.15); color: var(--green); border: 1px solid rgba(63, 185, 80, 0.3); }
  .badge-warning { background: rgba(210, 153, 34, 0.15); color: var(--yellow); border: 1px solid rgba(210, 153, 34, 0.3); }
  .badge-critical { background: rgba(248, 81, 73, 0.15); color: var(--red); border: 1px solid rgba(248, 81, 73, 0.3); }

  /* Status Cards */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .card-label { color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .card-value { font-size: 28px; font-weight: 700; }
  .card-detail { color: var(--text-dim); font-size: 12px; margin-top: 4px; }
  .card-value.green { color: var(--green); }
  .card-value.yellow { color: var(--yellow); }
  .card-value.red { color: var(--red); }

  /* Action Bar */
  .actions {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn:active { transform: scale(0.98); }
  .btn.primary { background: rgba(88, 166, 255, 0.1); border-color: var(--accent); color: var(--accent); }
  .btn.primary:hover { background: rgba(88, 166, 255, 0.2); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn .spinner { display: none; }
  .btn.loading .spinner { display: inline; }
  .btn.loading .label { display: none; }

  /* Sections */
  .section { margin-bottom: 24px; }
  .section-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title .count {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1px 8px;
    font-size: 12px;
    color: var(--text-dim);
  }

  /* Issues Table */
  .issues-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .issues-table th {
    text-align: left;
    padding: 10px 14px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    background: rgba(0,0,0,0.2);
    border-bottom: 1px solid var(--border);
  }
  .issues-table td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .issues-table tr:last-child td { border-bottom: none; }
  .sev-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
  }
  .sev-critical .sev-dot { background: var(--red); }
  .sev-warning .sev-dot { background: var(--yellow); }
  .sev-info .sev-dot { background: var(--blue); }

  /* Project Grid */
  .project-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 8px;
  }
  .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .project-card:hover { border-color: var(--accent); }
  .project-name { font-weight: 600; font-size: 13px; margin-bottom: 6px; }
  .project-icons { display: flex; gap: 8px; }
  .project-icon {
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .project-icon.active {
    color: var(--green);
    border-color: rgba(63, 185, 80, 0.3);
    background: rgba(63, 185, 80, 0.1);
  }

  /* Empty / Loading */
  .loading-msg, .empty-msg {
    text-align: center;
    color: var(--text-dim);
    padding: 40px;
  }

  /* No Issues Banner */
  .no-issues {
    background: rgba(63, 185, 80, 0.08);
    border: 1px solid rgba(63, 185, 80, 0.2);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
    color: var(--green);
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1><span>God</span> Claude</h1>
  </div>
  <div class="header-meta">
    <div id="health-badge" class="badge badge-healthy">Loading...</div>
    <div class="timestamp" id="timestamp">--</div>
  </div>
</div>

<div class="cards" id="cards">
  <div class="card"><div class="card-label">Status</div><div class="card-value">--</div></div>
</div>

<div class="actions">
  <button class="btn primary" id="btn-audit" onclick="triggerAudit()">
    <span class="label">Run Audit Now</span>
    <span class="spinner">Running...</span>
  </button>
  <button class="btn" onclick="openObsidian()">Open in Obsidian</button>
  <button class="btn" onclick="triggerFix('stale-session-states')">Refresh Stale States</button>
  <button class="btn" onclick="triggerFix('empty-memory-index')">Fix Missing Indexes</button>
</div>

<div class="section" id="issues-section">
  <div class="section-title">Issues <span class="count" id="issue-count">0</span></div>
  <div id="issues-body"><div class="loading-msg">Loading audit data...</div></div>
</div>

<div class="section">
  <div class="section-title">Projects <span class="count" id="project-count">0</span></div>
  <div class="project-grid" id="project-grid"><div class="loading-msg">Loading...</div></div>
</div>

<script>
const API = window.location.origin;

async function fetchStatus() {
  try {
    const res = await fetch(`${API}/api/status`);
    if (!res.ok) throw new Error("Not ready");
    return await res.json();
  } catch (err) {
    console.error("Failed to fetch status:", err);
    return null;
  }
}

function render(data) {
  if (!data) return;

  // Health badge
  const badge = document.getElementById("health-badge");
  badge.textContent = data.overall.toUpperCase();
  badge.className = `badge badge-${data.overall}`;

  // Timestamp
  const ts = new Date(data.timestamp);
  document.getElementById("timestamp").textContent =
    `Last audit: ${ts.toLocaleTimeString()} — ${ts.toLocaleDateString()}`;

  // Summary cards
  const s = data.summary;
  const wd = data.checks.watchdog;
  document.getElementById("cards").innerHTML = `
    <div class="card">
      <div class="card-label">Projects</div>
      <div class="card-value">${s.projectCount}</div>
      <div class="card-detail">${s.projectsWithClaudeMd} with CLAUDE.md</div>
    </div>
    <div class="card">
      <div class="card-label">Plugins</div>
      <div class="card-value green">${s.pluginsEnabled}</div>
      <div class="card-detail">${s.pluginsDisabled} disabled, ${s.pluginsMissing} missing</div>
    </div>
    <div class="card">
      <div class="card-label">Session States</div>
      <div class="card-value ${s.sessionStatesStale > 0 ? 'yellow' : 'green'}">${s.sessionStatesTotal}</div>
      <div class="card-detail">${s.sessionStatesStale} stale (&gt;7d)</div>
    </div>
    <div class="card">
      <div class="card-label">Memory Dirs</div>
      <div class="card-value">${s.memoryDirsTotal}</div>
      <div class="card-detail">${s.memoryDirsEmpty} empty</div>
    </div>
    <div class="card">
      <div class="card-label">Watchdog</div>
      <div class="card-value ${wd.healthy ? 'green' : 'red'}">${wd.healthy ? 'UP' : 'DOWN'}</div>
      <div class="card-detail">${wd.details?.ageMins != null ? wd.details.ageMins + 'm ago' : 'unknown'}</div>
    </div>
    <div class="card">
      <div class="card-label">Issues</div>
      <div class="card-value ${data.issueCount === 0 ? 'green' : data.overall === 'critical' ? 'red' : 'yellow'}">${data.issueCount}</div>
      <div class="card-detail">${data.overall}</div>
    </div>
  `;

  // Issues
  document.getElementById("issue-count").textContent = data.issueCount;
  if (data.issues.length === 0) {
    document.getElementById("issues-body").innerHTML =
      '<div class="no-issues">All systems healthy. No issues detected.</div>';
  } else {
    let rows = data.issues.map(i => `
      <tr class="sev-${i.severity}">
        <td><span class="sev-dot"></span>${i.severity}</td>
        <td>${i.source}</td>
        <td>${escapeHtml(i.message)}</td>
      </tr>
    `).join("");
    document.getElementById("issues-body").innerHTML = `
      <table class="issues-table">
        <thead><tr><th>Severity</th><th>Source</th><th>Issue</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  // Projects
  const projects = data.checks.projects.projects || [];
  document.getElementById("project-count").textContent = projects.length;
  document.getElementById("project-grid").innerHTML = projects.map(p => `
    <div class="project-card">
      <div class="project-name">${escapeHtml(p.devName)}</div>
      <div class="project-icons">
        <span class="project-icon ${p.hasClaudeMd ? 'active' : ''}" title="CLAUDE.md">MD</span>
        <span class="project-icon ${p.hasMemory ? 'active' : ''}" title="Memory (${p.memoryFiles} files)">MEM${p.hasMemory ? ':' + p.memoryFiles : ''}</span>
        <span class="project-icon ${p.hasSessionState ? 'active' : ''}" title="Session State">SS</span>
        <span class="project-icon ${p.hasMcp ? 'active' : ''}" title="MCP Config">MCP</span>
      </div>
    </div>
  `).join("");
}

async function triggerAudit() {
  const btn = document.getElementById("btn-audit");
  btn.classList.add("loading");
  btn.disabled = true;
  try {
    const res = await fetch(`${API}/api/audit`, { method: "POST" });
    const data = await res.json();
    render(data);
  } catch (err) {
    console.error("Audit failed:", err);
  } finally {
    btn.classList.remove("loading");
    btn.disabled = false;
  }
}

async function triggerFix(fixId) {
  try {
    const res = await fetch(`${API}/api/fix/${fixId}`, { method: "POST" });
    const result = await res.json();
    alert(result.message);
    // Refresh dashboard with updated audit
    const status = await fetchStatus();
    render(status);
  } catch (err) {
    alert("Fix failed: " + err.message);
  }
}

function openObsidian() {
  window.open("obsidian://open?vault=Obsidian%20Vault&file=Projects%2Fgawdclaude%2F_audit", "_blank");
}

function escapeHtml(str) {
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// Initial load
fetchStatus().then(render);

// Auto-refresh every 60s
setInterval(async () => {
  const data = await fetchStatus();
  if (data) render(data);
}, 60000);
</script>
</body>
</html>
