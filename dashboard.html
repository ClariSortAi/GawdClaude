  /* ===== Theme Variables ===== */
  :root {
    --transition-theme: background 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    --font-sans: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'Geist Mono', 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  }

  [data-theme="light"] {
    --bg: #fafaf9;
    --bg-subtle: #f5f5f4;
    --surface: #ffffff;
    --border: #e7e5e4;
    --border-subtle: #f0eeec;
    --text: #1c1917;
    --text-secondary: #57534e;
    --text-dim: #a8a29e;
    --accent: #c2410c;
    --accent-light: rgba(194, 65, 12, 0.06);
    --accent-border: rgba(194, 65, 12, 0.15);
    --accent-glow: rgba(194, 65, 12, 0.1);
    --green: #15803d;
    --green-bg: rgba(21, 128, 61, 0.06);
    --green-border: rgba(21, 128, 61, 0.15);
    --yellow: #a16207;
    --yellow-bg: rgba(161, 98, 7, 0.06);
    --yellow-border: rgba(161, 98, 7, 0.15);
    --red: #dc2626;
    --red-bg: rgba(220, 38, 38, 0.06);
    --red-border: rgba(220, 38, 38, 0.15);
    --blue: #2563eb;
    --blue-bg: rgba(37, 99, 235, 0.06);
    --blue-border: rgba(37, 99, 235, 0.15);
    --shadow-sm: 0 1px 2px rgba(28, 25, 23, 0.03);
    --shadow-md: 0 2px 8px rgba(28, 25, 23, 0.05), 0 1px 2px rgba(28, 25, 23, 0.03);
    --shadow-lg: 0 8px 24px rgba(28, 25, 23, 0.07);
    --donut-empty: #e7e5e4;
    --table-header-bg: #fafaf9;
    --toggle-bg: #d6d3d1;
    --toggle-knob: #ffffff;
    --toast-bg: #ffffff;
    --skeleton: #e7e5e4;
    --skeleton-shine: #f5f5f4;
  }

  [data-theme="dark"] {
    --bg: #0c0a09;
    --bg-subtle: #1c1917;
    --surface: #1c1917;
    --border: #292524;
    --border-subtle: #211f1d;
    --text: #e7e5e4;
    --text-secondary: #a8a29e;
    --text-dim: #57534e;
    --accent: #ea580c;
    --accent-light: rgba(234, 88, 12, 0.08);
    --accent-border: rgba(234, 88, 12, 0.2);
    --accent-glow: rgba(234, 88, 12, 0.15);
    --green: #4ade80;
    --green-bg: rgba(74, 222, 128, 0.08);
    --green-border: rgba(74, 222, 128, 0.15);
    --yellow: #facc15;
    --yellow-bg: rgba(250, 204, 21, 0.08);
    --yellow-border: rgba(250, 204, 21, 0.15);
    --red: #f87171;
    --red-bg: rgba(248, 113, 113, 0.08);
    --red-border: rgba(248, 113, 113, 0.15);
    --blue: #60a5fa;
    --blue-bg: rgba(96, 165, 250, 0.08);
    --blue-border: rgba(96, 165, 250, 0.15);
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
    --shadow-md: 0 2px 8px rgba(0,0,0,0.3);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.4);
    --donut-empty: #292524;
    --table-header-bg: #1c1917;
    --toggle-bg: #292524;
    --toggle-knob: #ea580c;
    --toast-bg: #1c1917;
    --skeleton: #292524;
    --skeleton-shine: #44403c;
  }

  /* ===== Reset ===== */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.5;
    transition: var(--transition-theme);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 32px 48px;
  }

  code, .mono { font-family: var(--font-mono); font-size: 12px; }

  /* ===== Animations ===== */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @keyframes drawIn { from { stroke-dashoffset: var(--circumference); } to { stroke-dashoffset: var(--final-offset); } }
  @keyframes barGrow { from { height: 0; } }

  .fade-in { animation: fadeUp 0.35s ease both; }
  .fade-in-1 { animation-delay: 0.04s; }
  .fade-in-2 { animation-delay: 0.08s; }
  .fade-in-3 { animation-delay: 0.12s; }
  .fade-in-4 { animation-delay: 0.16s; }
  .fade-in-5 { animation-delay: 0.20s; }

  /* ===== Skeleton loading ===== */
  .skel {
    background: linear-gradient(90deg, var(--skeleton) 25%, var(--skeleton-shine) 50%, var(--skeleton) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 6px;
  }
  .skel-card { height: 88px; border-radius: 12px; }
  .skel-chart { height: 180px; border-radius: 12px; }
  .skel-row { height: 16px; margin-bottom: 8px; }

  /* ===== Header ===== */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
    animation: fadeUp 0.4s ease both;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo-mark {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.2s ease;
  }
  .logo-mark:hover { transform: scale(1.05); }
  .logo-mark svg { width: 18px; height: 18px; }
  .header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.03em; }
  .header h1 .gawd { color: var(--accent); }
  .header h1 .claude { color: var(--text); font-weight: 500; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .header-meta { text-align: right; }
  .header-meta .timestamp { color: var(--text-dim); font-size: 11px; margin-top: 2px; font-family: var(--font-mono); }

  /* Theme toggle */
  .theme-toggle {
    width: 40px; height: 22px;
    border-radius: 11px;
    background: var(--toggle-bg);
    border: 1px solid var(--border);
    cursor: pointer;
    position: relative;
    transition: background 0.3s, border-color 0.3s;
    flex-shrink: 0;
  }
  .theme-toggle::after {
    content: "";
    position: absolute;
    top: 2px; left: 2px;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--toggle-knob);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  [data-theme="dark"] .theme-toggle::after { transform: translateX(18px); }
  .theme-toggle-wrap { display: flex; align-items: center; gap: 6px; }
  .theme-icon { font-size: 13px; transition: opacity 0.3s; user-select: none; color: var(--text-dim); }
  .theme-icon-sun { opacity: 0.8; }
  .theme-icon-moon { opacity: 0.3; }
  [data-theme="dark"] .theme-icon-sun { opacity: 0.3; }
  [data-theme="dark"] .theme-icon-moon { opacity: 0.8; }

  /* Health Badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-family: var(--font-mono);
  }
  .badge::before { content: ""; width: 6px; height: 6px; border-radius: 50%; }
  .badge-healthy { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .badge-healthy::before { background: var(--green); }
  .badge-warning { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow-border); }
  .badge-warning::before { background: var(--yellow); }
  .badge-critical { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
  .badge-critical::before { background: var(--red); }

  /* ===== Cards (Bento Grid) ===== */
  .cards {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    transition: var(--transition-theme), transform 0.15s ease;
  }
  .card:hover { transform: translateY(-1px); }
  .card.card-wide { grid-column: span 2; }
  .card-label {
    color: var(--text-dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .card-value {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.03em;
    line-height: 1.1;
    font-variant-numeric: tabular-nums;
  }
  .card-detail { color: var(--text-dim); font-size: 12px; margin-top: 4px; }
  .card-value.green { color: var(--green); }
  .card-value.yellow { color: var(--yellow); }
  .card-value.red { color: var(--red); }

  /* ===== Charts ===== */
  .charts {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    transition: var(--transition-theme);
  }
  .chart-title {
    font-size: 12px;
    font-weight: 500;
    margin-bottom: 14px;
    color: var(--text-secondary);
    letter-spacing: -0.01em;
  }

  /* Horizontal coverage bars */
  .h-bars { display: flex; flex-direction: column; gap: 10px; }
  .h-bar-row { display: flex; align-items: center; gap: 10px; }
  .h-bar-label { font-size: 11px; color: var(--text-dim); width: 64px; flex-shrink: 0; text-align: right; font-weight: 500; }
  .h-bar-track { flex: 1; height: 20px; background: var(--bg-subtle); border-radius: 4px; overflow: hidden; position: relative; }
  .h-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    min-width: 2px;
  }
  .h-bar-pct {
    font-size: 11px;
    font-family: var(--font-mono);
    font-weight: 600;
    color: var(--text);
    width: 42px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* Score histogram */
  .histogram { display: flex; align-items: flex-end; gap: 3px; height: 80px; }
  .hist-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
  .hist-bar {
    width: 100%;
    border-radius: 3px 3px 1px 1px;
    min-height: 0;
    animation: barGrow 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  .hist-bar-wrap:nth-child(1) .hist-bar { animation-delay: 0.08s; }
  .hist-bar-wrap:nth-child(2) .hist-bar { animation-delay: 0.12s; }
  .hist-bar-wrap:nth-child(3) .hist-bar { animation-delay: 0.16s; }
  .hist-bar-wrap:nth-child(4) .hist-bar { animation-delay: 0.20s; }
  .hist-bar-wrap:nth-child(5) .hist-bar { animation-delay: 0.24s; }
  .hist-count { font-size: 10px; font-weight: 600; font-family: var(--font-mono); margin-bottom: 3px; color: var(--text); }
  .hist-labels { display: flex; gap: 3px; margin-top: 6px; }
  .hist-label { flex: 1; font-size: 9px; color: var(--text-dim); text-align: center; font-family: var(--font-mono); }
  .hist-avg { font-size: 11px; color: var(--text-dim); margin-top: 8px; font-family: var(--font-mono); }
  .hist-avg strong { color: var(--text); }

  /* Donut chart */
  .donut-container { display: flex; align-items: center; gap: 20px; }
  .donut-svg { width: 90px; height: 90px; }
  .donut-svg circle { transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
  .donut-legend { display: flex; flex-direction: column; gap: 5px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-secondary); }
  .legend-item strong { color: var(--text); font-variant-numeric: tabular-nums; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  /* Compact donut pair (side by side in one card) */
  .donut-pair { display: flex; gap: 24px; }
  .donut-pair .donut-container { flex: 1; }

  /* ===== Actions ===== */
  .actions {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s ease;
  }
  .btn:hover { border-color: var(--accent-border); color: var(--accent); }
  .btn:active { transform: scale(0.98); }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn.primary:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ===== Toast ===== */
  .toast-container { position: fixed; top: 16px; right: 16px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--toast-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    box-shadow: var(--shadow-lg);
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    animation: slideIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-width: 360px;
    color: var(--text);
    position: relative;
    overflow: hidden;
  }
  .toast::after {
    content: "";
    position: absolute;
    bottom: 0; left: 0;
    height: 2px;
    background: var(--accent);
    animation: toast-timer 3.5s linear forwards;
  }
  @keyframes toast-timer { from { width: 100%; } to { width: 0%; } }
  .toast.success { border-left: 2px solid var(--green); }
  .toast.success::after { background: var(--green); }
  .toast.error { border-left: 2px solid var(--red); }
  .toast.error::after { background: var(--red); }
  .toast.info { border-left: 2px solid var(--blue); }
  .toast.info::after { background: var(--blue); }

  /* ===== Sections ===== */
  .section { margin-bottom: 24px; }
  .section-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: -0.02em;
  }
  .section-title .count {
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1px 8px;
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 500;
    font-family: var(--font-mono);
  }

  /* ===== Issues Table ===== */
  .issues-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .issues-table th {
    text-align: left;
    padding: 10px 14px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    background: var(--table-header-bg);
    border-bottom: 1px solid var(--border);
    font-weight: 500;
  }
  .issues-table td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border-subtle);
    font-size: 13px;
    color: var(--text-secondary);
  }
  .issues-table tr:last-child td { border-bottom: none; }
  .issues-table tr:hover td { background: var(--bg-subtle); }
  .sev-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-family: var(--font-mono);
  }
  .sev-critical .sev-badge { background: var(--red-bg); color: var(--red); }
  .sev-warning .sev-badge { background: var(--yellow-bg); color: var(--yellow); }
  .sev-info .sev-badge { background: var(--blue-bg); color: var(--blue); }

  /* ===== Projects ===== */
  .project-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 8px;
  }
  .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    transition: var(--transition-theme), border-color 0.15s;
  }
  .project-card:hover { border-color: var(--accent-border); }
  .project-name { font-weight: 600; font-size: 13px; margin-bottom: 6px; letter-spacing: -0.01em; }
  .project-icons { display: flex; gap: 4px; }
  .project-icon {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font-mono);
  }
  .project-icon.active { color: var(--green); border-color: var(--green-border); background: var(--green-bg); }

  /* ===== Today ===== */
  .today-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .today-totals { display: flex; gap: 16px; font-size: 12px; color: var(--text-dim); }
  .today-totals strong { color: var(--text); font-variant-numeric: tabular-nums; }
  .timeline-project {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .timeline-project-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--bg-subtle);
    border-bottom: 1px solid var(--border-subtle);
    cursor: pointer;
    transition: background 0.15s;
  }
  .timeline-project-header:hover { background: var(--border-subtle); }
  .timeline-project-name { font-weight: 600; font-size: 13px; letter-spacing: -0.01em; }
  .timeline-project-meta { font-size: 11px; color: var(--text-dim); display: flex; gap: 12px; font-family: var(--font-mono); }
  .timeline-sessions { padding: 0; }
  .timeline-sessions.collapsed { display: none; }
  .timeline-session { padding: 12px 16px; border-bottom: 1px solid var(--border-subtle); }
  .timeline-session:last-child { border-bottom: none; }
  .session-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .session-time {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    background: var(--accent-light);
    padding: 2px 8px;
    border-radius: 4px;
  }
  .session-focus { font-size: 13px; color: var(--text); }
  .session-accomplishments { margin: 6px 0 0; padding: 0; list-style: none; }
  .session-accomplishments li { font-size: 12px; color: var(--text-secondary); padding: 2px 0 2px 18px; position: relative; }
  .session-accomplishments li::before { content: "\2713"; position: absolute; left: 0; color: var(--green); font-weight: 600; font-size: 12px; }
  .session-nextsteps { margin-top: 4px; }
  .session-nextsteps li::before { content: "\2192"; color: var(--accent); }
  .session-branch {
    font-size: 11px;
    font-family: var(--font-mono);
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 4px;
    color: var(--text-dim);
  }
  .today-empty, .no-data {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
  }

  /* ===== Scores ===== */
  .scores-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
  }
  .score-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: var(--transition-theme), border-color 0.15s;
  }
  .score-card:hover { border-color: var(--accent-border); }
  .score-ring { width: 40px; height: 40px; flex-shrink: 0; }
  .score-info { flex: 1; min-width: 0; }
  .score-name { font-weight: 600; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.01em; }
  .score-meta { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); }
  .score-heal-btn {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid var(--accent-border);
    background: var(--accent-light);
    cursor: pointer;
    color: var(--accent);
    font-family: var(--font-mono);
    font-weight: 600;
    transition: all 0.15s;
  }
  .score-heal-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .score-heal-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Ignored section */
  .ignored-section {
    margin-top: 12px;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .ignored-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--bg-subtle);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    transition: background 0.15s;
  }
  .ignored-header:hover { background: var(--border-subtle); }

  /* ===== Manage Projects Modal ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 90%;
    max-width: 640px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow-lg);
    animation: modalIn 0.15s ease-out;
  }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.97) translateY(8px); } to { opacity: 1; transform: none; } }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .modal-header h2 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .modal-header .modal-close {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .modal-header .modal-close:hover { border-color: var(--accent-border); color: var(--accent); }
  .modal-search {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border-subtle);
  }
  .modal-search input {
    width: 100%;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    font-family: var(--font-sans);
    outline: none;
    transition: border-color 0.15s;
  }
  .modal-search input:focus { border-color: var(--accent-border); }
  .modal-search input::placeholder { color: var(--text-dim); }
  .modal-body {
    overflow-y: auto;
    padding: 8px 0;
    flex: 1;
  }
  .modal-project {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    transition: background 0.1s;
  }
  .modal-project:hover { background: var(--bg-subtle); }
  .modal-project-name {
    flex: 1;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .modal-project-name.ignored { color: var(--text-dim); text-decoration: line-through; }
  .modal-project-status {
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--font-mono);
  }
  /* Toggle switch */
  .switch {
    position: relative;
    width: 36px;
    height: 20px;
    flex-shrink: 0;
  }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch .slider {
    position: absolute;
    inset: 0;
    background: var(--toggle-bg);
    border-radius: 20px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .switch .slider::after {
    content: "";
    position: absolute;
    width: 16px;
    height: 16px;
    left: 2px;
    bottom: 2px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .switch input:checked + .slider { background: var(--green); }
  .switch input:checked + .slider::after { transform: translateX(16px); }
  .modal-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-dim);
  }

  .no-issues {
    background: var(--green-bg);
    border: 1px solid var(--green-border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    color: var(--green);
    font-weight: 500;
  }
  .loading-msg { text-align: center; color: var(--text-dim); padding: 40px; font-size: 13px; }

  /* Guidance boxes */
  .guidance-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 28px;
    color: var(--text-secondary);
    font-size: 13px;
    line-height: 1.6;
  }
  .guidance-box h3 { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
  .guidance-box code {
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 12px;
    color: var(--text);
  }
  .guidance-box ol, .guidance-box ul { margin: 6px 0; padding-left: 18px; }
  .guidance-box li { margin-bottom: 3px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Responsive */
  @media (max-width: 900px) {
    .cards { grid-template-columns: repeat(3, 1fr); }
    .card.card-wide { grid-column: span 1; }
    .charts { grid-template-columns: 1fr; }
    .donut-pair { flex-direction: column; gap: 16px; }
  }
  @media (max-width: 600px) {
    .wrap { padding: 0 16px 32px; }
    .header { flex-direction: column; align-items: flex-start; gap: 10px; }
    .cards { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

  <div class="skel skel-card"></div>
  <div class="skel skel-card"></div>
  <div class="skel skel-card"></div>
  <div class="skel skel-card"></div>
  <div class="skel skel-card"></div>
</div>

  <div class="skel skel-chart"></div>
  <div class="skel skel-chart"></div>
</div>

  </div>

  <button class="btn" onclick="openObsidian()">Obsidian</button>
  <button class="btn" onclick="triggerFix('stale-session-states')">Refresh Stale States</button>
  <button class="btn" onclick="triggerFix('empty-memory-index')">Fix Missing Indexes</button>

<script>
const API = window.location.origin;

// === Theme ===
function applyTheme(t) { document.documentElement.setAttribute("data-theme", t); localStorage.setItem("gawd-theme", t); }
function toggleTheme() { applyTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark"); }
applyTheme(localStorage.getItem("gawd-theme") || "light");

// === Count-up Animation ===
function countUp(el, target, duration = 600) {
  const start = performance.now();
  const from = 0;
  function tick(now) {
    const progress = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - progress, 3); // ease-out cubic
    el.textContent = Math.round(from + (target - from) * ease);
    if (progress < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// === Toast ===
function toast(message, type = "info") {
  const container = document.getElementById("toasts");
  const el = document.createElement("div");
  el.className = "toast " + type;
  el.textContent = message;
  container.appendChild(el);
  setTimeout(() => { el.style.opacity = "0"; el.style.transition = "opacity 0.3s"; setTimeout(() => el.remove(), 300); }, 3500);
}

// === Charts ===
function renderCharts(data) {
  const s = data.summary;
  const container = document.getElementById("charts");
  const total = s.projectCount || 1;

  // Horizontal coverage bars
  const coverageBars = [
    { label: "CLAUDE.md", value: s.projectsWithClaudeMd, color: "var(--accent)" },
    { label: "Memory", value: s.projectsWithMemory, color: "var(--green)" },
    { label: "Session", value: s.projectsWithSessionState, color: "var(--yellow)" },
    { label: "MCP", value: s.projectsWithMcp, color: "var(--text-dim)" },
  ].map(d =>
    '<div class="h-bar-row"><span class="h-bar-label">' + d.label + '</span>' +
    '<div class="h-bar-track"><div class="h-bar-fill" style="width:' + ((d.value / total) * 100) + '%;background:' + d.color + '"></div></div>' +
    '<span class="h-bar-pct">' + d.value + '/' + total + '</span></div>'
  ).join("");

  // Smart issue breakdown: by source when all same severity, by severity when mixed
  const sevCounts = { critical: 0, warning: 0, info: 0 };
  const srcCounts = {};
  for (const issue of data.issues) {
    sevCounts[issue.severity] = (sevCounts[issue.severity] || 0) + 1;
    srcCounts[issue.source] = (srcCounts[issue.source] || 0) + 1;
  }
  const distinctSeverities = Object.values(sevCounts).filter(v => v > 0).length;
  const srcColors = { memoryDirs: "var(--yellow)", projects: "var(--accent)", sessionStates: "var(--green)", plugins: "var(--red)", mcpConfigs: "var(--blue)", obsidianHook: "var(--text-dim)", watchdog: "var(--text-dim)", settings: "var(--text-dim)" };

  let issueDonut;
  if (data.issues.length === 0) {
    issueDonut = '<div class="chart-title">Issues</div><div class="donut-container">' +
      makeDonut([], "0") + '</div>';
  } else if (distinctSeverities <= 1) {
    // All same severity — show by source (more useful)
    const srcSegments = Object.entries(srcCounts).map(([k, v]) => ({ value: v, color: srcColors[k] || "var(--text-dim)", label: k }));
    issueDonut = '<div class="chart-title">Issues by Source</div><div class="donut-container">' +
      makeDonut(srcSegments, String(data.issues.length)) + '</div>';
  } else {
    issueDonut = '<div class="chart-title">Issues by Severity</div><div class="donut-container">' +
      makeDonut([
        { value: sevCounts.critical, color: "var(--red)", label: "Critical" },
        { value: sevCounts.warning, color: "var(--yellow)", label: "Warning" },
        { value: sevCounts.info, color: "var(--blue)", label: "Info" },
      ], String(data.issues.length)) + '</div>';
  }

  // Plugins donut
  const pluginTotal = s.pluginsEnabled + s.pluginsDisabled;
  const pluginDonut = '<div class="chart-title">Plugins</div><div class="donut-container">' +
    makeDonut([
      { value: s.pluginsEnabled, color: "var(--green)", label: "Enabled" },
      { value: s.pluginsDisabled, color: "var(--text-dim)", label: "Disabled" },
      { value: s.pluginsMissing, color: "var(--red)", label: "Missing" },
    ], String(pluginTotal)) + '</div>';

  container.innerHTML =
    '<div class="chart-card fade-in fade-in-1">' +
    '  <div class="chart-title">Config Coverage</div>' +
    '  <div class="h-bars">' + coverageBars + '</div>' +
    '</div>' +
    '<div class="chart-card fade-in fade-in-2">' +
    '  <div class="donut-pair">' +
    '    <div>' + issueDonut + '</div>' +
    '    <div>' + pluginDonut + '</div>' +
    '  </div>' +
    '</div>';
}

// === Score Histogram (called separately since it uses scores API) ===
function renderScoreHistogram(scores) {
  if (!scores || scores.length === 0) return;
  const filtered = scores.filter(s => s.fileCount > 0);
  if (filtered.length === 0) return;

  const buckets = [
    { label: "0-19", min: 0, max: 19, count: 0, color: "var(--red)" },
    { label: "20-39", min: 20, max: 39, count: 0, color: "var(--yellow)" },
    { label: "40-59", min: 40, max: 59, count: 0, color: "var(--yellow)" },
    { label: "60-79", min: 60, max: 79, count: 0, color: "var(--green)" },
    { label: "80+", min: 80, max: 100, count: 0, color: "var(--accent)" },
  ];
  for (const s of filtered) {
    for (const b of buckets) { if (s.score >= b.min && s.score <= b.max) { b.count++; break; } }
  }
  const maxCount = Math.max(...buckets.map(b => b.count), 1);
  const avg = Math.round(filtered.reduce((sum, s) => sum + s.score, 0) / filtered.length);

  // Insert histogram card into charts grid
  const chartsEl = document.getElementById("charts");
  const histCard = document.createElement("div");
  histCard.className = "chart-card fade-in";
  histCard.style.gridColumn = "1 / -1";
  histCard.innerHTML =
    '<div class="chart-title">CLAUDE.md Score Distribution (' + filtered.length + ' projects)</div>' +
    '<div class="histogram">' +
    buckets.map(b =>
      '<div class="hist-bar-wrap">' +
      (b.count > 0 ? '<div class="hist-count">' + b.count + '</div>' : '') +
      '<div class="hist-bar" style="height:' + ((b.count / maxCount) * 100) + '%;background:' + b.color + '"></div>' +
      '</div>'
    ).join("") +
    '</div>' +
    '<div class="hist-labels">' + buckets.map(b => '<div class="hist-label">' + b.label + '</div>').join("") + '</div>' +
    '<div class="hist-avg">avg score: <strong>' + avg + '</strong>/100</div>';
  chartsEl.appendChild(histCard);
}

function makeDonut(segments, centerText) {
  const total = segments.reduce((sum, s) => sum + s.value, 0) || 1;
  const r = 38, circumference = 2 * Math.PI * r;
  let offset = 0;

  const circles = segments.filter(s => s.value > 0).map(s => {
    const pct = s.value / total;
    const dashLen = pct * circumference;
    const circle = '<circle cx="50" cy="50" r="' + r + '" fill="none" stroke="' + s.color + '" stroke-width="12" ' +
      'stroke-dasharray="' + dashLen + ' ' + (circumference - dashLen) + '" ' +
      'stroke-dashoffset="' + (-offset) + '" transform="rotate(-90 50 50)" />';
    offset += dashLen;
    return circle;
  });

  if (circles.length === 0) {
    circles.push('<circle cx="50" cy="50" r="' + r + '" fill="none" stroke="var(--donut-empty)" stroke-width="12" />');
  }

  const legend = segments.map(s =>
    '<div class="legend-item"><div class="legend-dot" style="background:' + s.color + '"></div>' +
    '<span>' + s.label + ': <strong>' + s.value + '</strong></span></div>'
  ).join("");

  return '<svg class="donut-svg" viewBox="0 0 100 100">' + circles.join("") +
    '<text x="50" y="50" text-anchor="middle" dominant-baseline="central" ' +
    'font-size="18" font-weight="600" font-family="var(--font-mono)" fill="var(--text)">' + centerText + '</text></svg>' +
    '<div class="donut-legend">' + legend + '</div>';
}

// === Data Fetching ===
async function fetchStatus() {
  try { const r = await fetch(API + "/api/status"); if (!r.ok) throw 0; return await r.json(); }
  catch { return null; }
}

function render(data) {
  if (!data) return;

  const badge = document.getElementById("health-badge");
  badge.textContent = data.overall.toUpperCase();
  badge.className = "badge badge-" + data.overall;

  const ts = new Date(data.timestamp);
  document.getElementById("timestamp").textContent = ts.toLocaleTimeString() + " " + ts.toLocaleDateString();

  const s = data.summary;
  const wd = data.checks.watchdog;
  const watchdogCard = s.watchdogConfigured ?
    '<div class="card fade-in fade-in-5"><div class="card-label">Watchdog</div>' +
    '<div class="card-value ' + (wd.healthy ? "green" : "red") + '" data-count="' + (wd.healthy ? 1 : 0) + '">' + (wd.healthy ? "UP" : "DOWN") + '</div>' +
    '<div class="card-detail">' + (wd.details && wd.details.ageMins != null ? wd.details.ageMins + "m ago" : "--") + '</div></div>' : "";

  if (s.devDirExists === false) {
    toast("Projects directory not found: " + s.devDir + ". Run node setup.mjs to configure.", "error");
  }

  document.getElementById("cards").innerHTML =
    '<div class="card card-wide fade-in fade-in-1"><div class="card-label">Projects</div>' +
    '<div class="card-value" data-count="' + s.projectCount + '">0</div>' +
    '<div class="card-detail">' + s.projectsWithClaudeMd + ' with CLAUDE.md</div></div>' +

    '<div class="card fade-in fade-in-2"><div class="card-label">Plugins</div>' +
    '<div class="card-value green" data-count="' + s.pluginsEnabled + '">0</div>' +
    '<div class="card-detail">' + s.pluginsDisabled + ' disabled</div></div>' +

    '<div class="card fade-in fade-in-3"><div class="card-label">Sessions</div>' +
    '<div class="card-value ' + (s.sessionStatesStale > 0 ? "yellow" : "green") + '" data-count="' + s.sessionStatesTotal + '">0</div>' +
    '<div class="card-detail">' + s.sessionStatesStale + ' stale</div></div>' +

    '<div class="card fade-in fade-in-4"><div class="card-label">Memory</div>' +
    '<div class="card-value" data-count="' + s.memoryDirsTotal + '">0</div>' +
    '<div class="card-detail">' + s.memoryDirsEmpty + ' empty</div></div>' +

    watchdogCard +

    '<div class="card fade-in fade-in-5"><div class="card-label">Issues</div>' +
    '<div class="card-value ' + (data.issueCount === 0 ? "green" : data.overall === "critical" ? "red" : "yellow") + '" data-count="' + data.issueCount + '">0</div>' +
    '<div class="card-detail">' + data.overall + '</div></div>';

  // Count-up animation for all card values
  document.querySelectorAll(".card-value[data-count]").forEach(el => {
    const target = parseInt(el.getAttribute("data-count"), 10);
    if (!isNaN(target) && target > 0) countUp(el, target);
  });

  renderCharts(data);

  // Issues
  document.getElementById("issue-count").textContent = data.issueCount;
  if (data.issues.length === 0) {
    document.getElementById("issues-body").innerHTML = '<div class="no-issues">All systems healthy. No issues detected.</div>';
  } else {
    document.getElementById("issues-body").innerHTML =
      '<table class="issues-table"><thead><tr><th>Severity</th><th>Source</th><th>Issue</th></tr></thead><tbody>' +
      data.issues.map(i =>
        '<tr class="sev-' + i.severity + '"><td><span class="sev-badge">' + i.severity + '</span></td>' +
        '<td class="mono">' + i.source + '</td><td>' + escapeHtml(i.message) + '</td></tr>'
      ).join("") + '</tbody></table>';
  }

  // Projects
  const projects = data.checks.projects.projects || [];
  document.getElementById("project-count").textContent = projects.length;
  if (projects.length === 0) {
    document.getElementById("project-grid").innerHTML = '<div class="guidance-box" style="grid-column:1/-1">' +
      '<h3>No projects found</h3>' +
      '<p>GawdClaude scans your projects directory for Claude Code configurations.</p>' +
      '<ol><li>Set <code>devDir</code> in <code>config.json</code> to your repos directory</li>' +
      '<li>Use Claude Code in at least one project</li></ol>' +
      '<p>Run <code>node setup.mjs</code> to reconfigure.</p></div>';
    return;
  }
  document.getElementById("project-grid").innerHTML = projects.map(p =>
    '<div class="project-card">' +
    '<div class="project-name">' + escapeHtml(p.devName) + '</div>' +
    '<div class="project-icons">' +
    '<span class="project-icon ' + (p.hasClaudeMd ? "active" : "") + '" title="CLAUDE.md">MD</span>' +
    '<span class="project-icon ' + (p.hasMemory ? "active" : "") + '" title="Memory (' + p.memoryFiles + ')">MEM</span>' +
    '<span class="project-icon ' + (p.hasSessionState ? "active" : "") + '" title="Session State">SS</span>' +
    '<span class="project-icon ' + (p.hasMcp ? "active" : "") + '" title="MCP Config">MCP</span>' +
    '</div></div>'
  ).join("");
}

// === Today ===
async function fetchToday() {
  try { const r = await fetch(API + "/api/today"); if (!r.ok) return null; return await r.json(); }
  catch { return null; }
}

function renderToday(data) {
  if (!data) return;
  const t = data.totals;
  document.getElementById("today-count").textContent = t.projectsActive + " projects";
  document.getElementById("today-totals").innerHTML =
    '<span><strong>' + t.sessionsTotal + '</strong> sessions</span>' +
    '<span><strong>' + t.accomplishmentsTotal + '</strong> accomplishments</span>';

  const body = document.getElementById("today-body");
  const active = data.projects.filter(p => p.sessions.some(s => s.focus || s.accomplishments.length > 0));

  if (active.length === 0) {
    body.innerHTML = '<div class="guidance-box">' +
      '<h3>No activity yet today</h3>' +
      '<p>This section shows daily work across all projects. Data sources:</p>' +
      '<ul><li><strong>Obsidian vault diaries</strong> - from the <code>obsidian-journal.mjs</code> Stop hook</li>' +
      '<li><strong>Session-state files</strong> - from <code>~/.claude/hooks/session-state/</code></li></ul>' +
      '<p>To enable Obsidian integration:</p>' +
      '<ol><li>Set <code>obsidian.vaultRoot</code> in <code>config.json</code></li>' +
      '<li>Add <code>obsidian-journal.mjs</code> as a Stop hook in <code>~/.claude/settings.json</code></li>' +
      '<li>Configure session-state hooks for project state on session end</li></ol></div>';
    return;
  }

  body.innerHTML = '<div class="timeline">' + active.map(p => {
    const totalAcc = p.sessions.reduce((s, sess) => s + sess.accomplishments.length, 0);
    const lastTime = p.sessions[p.sessions.length - 1]?.time || "";
    return '<div class="timeline-project">' +
      '<div class="timeline-project-header" onclick="this.parentElement.querySelector(\'.timeline-sessions\').classList.toggle(\'collapsed\')">' +
      '<span class="timeline-project-name">' + escapeHtml(p.name) + '</span>' +
      '<span class="timeline-project-meta">' +
      '<span>' + p.sessions.length + ' session' + (p.sessions.length > 1 ? "s" : "") + '</span>' +
      '<span>' + totalAcc + ' done</span><span>' + lastTime + '</span></span></div>' +
      '<div class="timeline-sessions">' + p.sessions.map(s =>
        '<div class="timeline-session"><div class="session-header">' +
        '<span class="session-time">' + (s.time || "--") + '</span>' +
        (s.branch ? '<span class="session-branch">' + escapeHtml(s.branch) + '</span>' : "") +
        (s.filesChanged ? '<span style="font-size:11px;color:var(--text-dim)">' + s.filesChanged + ' files</span>' : "") +
        '</div>' +
        (s.focus ? '<div class="session-focus">' + escapeHtml(s.focus) + '</div>' : "") +
        (s.accomplishments.length > 0 ? '<ul class="session-accomplishments">' + s.accomplishments.map(a => '<li>' + escapeHtml(a) + '</li>').join("") + '</ul>' : "") +
        (s.nextSteps.length > 0 ? '<ul class="session-accomplishments session-nextsteps">' + s.nextSteps.map(n => '<li>' + escapeHtml(n) + '</li>').join("") + '</ul>' : "") +
        '</div>'
      ).join("") + '</div></div>';
  }).join("") + '</div>';
}

// === Scores ===
async function fetchScores() {
  try { const r = await fetch(API + "/api/scores"); if (!r.ok) return null; return await r.json(); }
  catch { return null; }
}

function scoreColor(score) {
  if (score >= 70) return "var(--green)";
  if (score >= 40) return "var(--yellow)";
  return "var(--red)";
}

function miniRing(score) {
  const r = 15, circ = 2 * Math.PI * r;
  const dash = (score / 100) * circ;
  const color = scoreColor(score);
  return '<svg class="score-ring" viewBox="0 0 38 38">' +
    '<circle cx="19" cy="19" r="' + r + '" fill="none" stroke="var(--donut-empty)" stroke-width="3.5"/>' +
    '<circle cx="19" cy="19" r="' + r + '" fill="none" stroke="' + color + '" stroke-width="3.5" ' +
    'stroke-dasharray="' + dash + ' ' + (circ - dash) + '" stroke-dashoffset="0" ' +
    'transform="rotate(-90 19 19)" stroke-linecap="round"/>' +
    '<text x="19" y="19" text-anchor="middle" dominant-baseline="central" ' +
    'font-size="10" font-weight="600" font-family="var(--font-mono)" fill="' + color + '">' + score + '</text></svg>';
}

function renderScores(scores) {
  if (!scores || scores.length === 0) return;
  const filtered = scores.filter(s => s.fileCount > 0);
  filtered.sort((a, b) => a.score - b.score);
  const below = filtered.filter(s => s.score < 60).length;
  document.getElementById("scores-count").textContent = below + " need work";
  document.getElementById("scores-body").innerHTML = '<div class="scores-grid">' +
    filtered.map(s =>
      '<div class="score-card">' + miniRing(s.score) +
      '<div class="score-info"><div class="score-name" title="' + escapeHtml(s.name) + '">' + escapeHtml(s.name) + '</div>' +
      '<div class="score-meta">' + s.complexity + ' | ' + (s.hasClaudeMd ? s.claudeMdLines + 'L' : 'none') + ' | ' + (s.stack.slice(0, 2).join(', ') || '?') + '</div></div>' +
      (s.score < 60 ? '<button class="score-heal-btn" onclick="healOne(this,\'' + escapeHtml(s.name) + '\')">Heal</button>' : '') +
      '</div>'
    ).join("") + '</div>';
}

async function healOne(btn, projectName) {
  btn.disabled = true; btn.textContent = "...";
  toast("Healing " + projectName + "...", "info");
  try {
    const res = await fetch(API + "/api/heal/" + encodeURIComponent(projectName), { method: "POST" });
    const result = await res.json();
    if (result.success) {
      toast(projectName + ": " + result.oldScore + " -> " + result.newScore + " (" + result.elapsed + ")", "success");
      btn.textContent = result.newScore;
    } else {
      toast(projectName + " failed: " + result.error, "error");
      btn.textContent = "Fail";
    }
    fetchScores().then(s => { if (s) renderScores(s); });
  } catch (err) { toast("Heal failed: " + err.message, "error"); btn.textContent = "Err"; }
}

// === Actions ===
async function triggerAudit() {
  const btn = document.getElementById("btn-audit");
  const orig = btn.textContent;
  btn.textContent = "Running..."; btn.disabled = true;
  try {
    const res = await fetch(API + "/api/audit", { method: "POST" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    render(data);
    toast("Audit complete: " + data.overall + " (" + data.issueCount + " issues)", data.overall === "healthy" ? "success" : "info");
    fetchToday().then(t => { if (t) renderToday(t); });
  } catch (err) { toast("Audit failed: " + err.message, "error"); }
  finally { btn.textContent = orig; btn.disabled = false; }
}

async function triggerFix(fixId) {
  toast("Applying fix: " + fixId.replace(/-/g, " ") + "...", "info");
  try {
    const res = await fetch(API + "/api/fix/" + fixId, { method: "POST" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const result = await res.json();
    toast(result.message, result.fixed ? "success" : "error");
    const status = await fetchStatus();
    if (status) render(status);
  } catch (err) { toast("Fix failed: " + err.message, "error"); }
}

async function openObsidian() {
  try {
    const res = await fetch(API + "/api/config");
    const cfg = await res.json();
    if (cfg.obsidianVault) {
      window.location.href = "obsidian://open?vault=" + encodeURIComponent(cfg.obsidianVault) + "&file=Projects%2Fgawdclaude%2F_audit";
    } else { toast("No Obsidian vault configured. Run node setup.mjs to set one.", "error"); }
  } catch { toast("Failed to read config", "error"); }
}

// === Manage Projects ===
let allProjects = [];
let ignoredProjects = [];

async function fetchIgnoreList() {
  try {
    const res = await fetch(API + "/api/config");
    const cfg = await res.json();
    ignoredProjects = cfg.ignore || [];
    renderIgnoredSection();
  } catch {}
}

function renderIgnoredSection() {
  const section = document.getElementById("ignored-section");
  const count = document.getElementById("ignored-count");
  if (ignoredProjects.length === 0) {
    section.style.display = "none";
    return;
  }
  section.style.display = "";
  count.textContent = ignoredProjects.length;
}

async function openManageProjects() {
  const modal = document.getElementById("manage-modal");
  modal.classList.add("open");
  document.getElementById("manage-search").value = "";
  document.getElementById("manage-body").innerHTML = '<div style="padding:20px;color:var(--text-dim);font-size:13px">Loading...</div>';
  try {
    const res = await fetch(API + "/api/all-projects");
    const data = await res.json();
    allProjects = data.projects;
    renderManageList("");
  } catch (err) {
    document.getElementById("manage-body").innerHTML = '<div style="padding:20px;color:var(--red);font-size:13px">Failed: ' + escapeHtml(err.message) + '</div>';
  }
}

function closeManageProjects() {
  document.getElementById("manage-modal").classList.remove("open");
}

function filterManageList(query) {
  renderManageList(query.toLowerCase().trim());
}

function renderManageList(filter) {
  const body = document.getElementById("manage-body");
  const filtered = filter ? allProjects.filter(p => p.name.toLowerCase().includes(filter)) : allProjects;
  const active = allProjects.filter(p => !p.ignored).length;
  document.getElementById("manage-summary").textContent = active + " active / " + allProjects.length + " total";

  if (filtered.length === 0) {
    body.innerHTML = '<div style="padding:20px;color:var(--text-dim);font-size:13px">No match</div>';
    return;
  }

  body.innerHTML = filtered.map(p =>
    '<div class="modal-project" data-name="' + escapeHtml(p.name) + '">' +
    '<span class="modal-project-name' + (p.ignored ? ' ignored' : '') + '">' + escapeHtml(p.name) + '</span>' +
    (p.ignored ? '<span class="modal-project-status">excluded</span>' : '') +
    '<label class="switch">' +
    '<input type="checkbox"' + (p.ignored ? '' : ' checked') + ' onchange="toggleProject(\'' + escapeHtml(p.name) + '\', this)">' +
    '<span class="slider"></span>' +
    '</label></div>'
  ).join("");
}

async function toggleProject(name, checkbox) {
  const row = checkbox.closest(".modal-project");
  const nameEl = row.querySelector(".modal-project-name");
  try {
    const res = await fetch(API + "/api/ignore/" + encodeURIComponent(name), { method: "POST" });
    const result = await res.json();
    ignoredProjects = result.ignore;
    const proj = allProjects.find(p => p.name === name);
    if (proj) proj.ignored = result.action === "added";
    const statusEl = row.querySelector(".modal-project-status");
    if (result.action === "added") {
      nameEl.classList.add("ignored");
      if (!statusEl) {
        const s = document.createElement("span");
        s.className = "modal-project-status";
        s.textContent = "excluded";
        row.insertBefore(s, row.querySelector(".switch"));
      }
    } else {
      nameEl.classList.remove("ignored");
      if (statusEl) statusEl.remove();
    }
    const active = allProjects.filter(p => !p.ignored).length;
    document.getElementById("manage-summary").textContent = active + " active / " + allProjects.length + " total";
    renderIgnoredSection();
    Promise.all([fetchStatus(), fetchScores()]).then(([status, scores]) => {
      if (status) render(status);
      if (scores) { renderScores(scores); renderScoreHistogram(scores); }
    });
  } catch (err) {
    checkbox.checked = !checkbox.checked;
    toast("Failed: " + err.message, "error");
  }
}

function escapeHtml(str) {
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// === Keyboard ===
document.addEventListener("keydown", e => { if (e.key === "Escape") closeManageProjects(); });

// === Init ===
fetchIgnoreList();
Promise.all([fetchStatus(), fetchToday(), fetchScores()]).then(([status, today, scores]) => {
  if (status) render(status);
  else document.getElementById("issues-body").innerHTML = '<div class="loading-msg">Server not ready. Retrying...</div>';
  if (today) renderToday(today);
  if (scores) { renderScores(scores); renderScoreHistogram(scores); }
});

let scoreRefreshCount = 0;
setInterval(async () => {
  scoreRefreshCount++;
  const [status, today] = await Promise.all([fetchStatus(), fetchToday()]);
  if (status) render(status);
  if (today) renderToday(today);
  if (scoreRefreshCount % 5 === 0) {
    const scores = await fetchScores();
    if (scores) { renderScores(scores); renderScoreHistogram(scores); }
  }
}, 60000);
</script>
</body>
